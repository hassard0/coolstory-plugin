name: Release Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: coolstory-desktop-linux-x64.AppImage
            target: --linux AppImage --x64
            output: dist-electron/coolstory-desktop-linux-x64.AppImage
          - os: windows-latest
            artifact: coolstory-desktop-win-x64.exe
            target: --win portable --x64
            output: dist-electron/coolstory-desktop-win-x64.exe
          - os: macos-14
            artifact: coolstory-desktop-macos-arm64.zip
            target: --mac zip --arm64
            output: dist-electron/coolstory-desktop-macos-arm64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Smoke
        run: npm run smoke

      - name: Desktop smoke
        run: npm run smoke:desktop

      - name: Build desktop app
        run: npm run build:desktop -- ${{ matrix.target }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.output }}

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.output }}
