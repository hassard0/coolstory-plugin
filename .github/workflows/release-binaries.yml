name: Release Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: coolstory-plugin-linux-x64
            binary: coolstory-plugin-linux-x64
          - os: windows-latest
            artifact: coolstory-plugin-win-x64.exe
            binary: coolstory-plugin-win-x64.exe
          - os: macos-13
            artifact: coolstory-plugin-macos-x64
            binary: coolstory-plugin-macos-x64
          - os: macos-14
            artifact: coolstory-plugin-macos-arm64
            binary: coolstory-plugin-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Smoke
        run: npm run smoke

      - name: Build binaries
        run: npm run build:binary
        env:
          COOLSTORY_BINARY_NAME: ${{ matrix.binary }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.binary }}

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.binary }}
