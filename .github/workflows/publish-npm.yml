name: Publish npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish as a dry run"
        type: boolean
        default: true
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      COOLSTORY_MCP_SMOKE_TOKEN: ${{ secrets.COOLSTORY_MCP_SMOKE_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Install
        run: npm ci

      - name: Smoke
        run: npm run smoke

      - name: MCP smoke
        if: ${{ env.COOLSTORY_MCP_SMOKE_TOKEN != '' }}
        run: npm run smoke:mcp
        env:
          COOLSTORY_API_URL: https://coolstory.dev
          COOLSTORY_TOKEN: ${{ env.COOLSTORY_MCP_SMOKE_TOKEN }}

      - name: Inspect package contents
        run: npm pack --dry-run

      - name: Dry-run publish
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: npm publish --dry-run --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
